<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シネツウ | cinetsuu</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --text: #ffffff;
            --accent: #0044ff; /* キタノ・ブルーをイメージ */
            --border: #333333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; }
        .logo span { font-size: 0.8rem; color: #888; }

        .nav-buttons button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 15px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 0.8rem;
        }

        .nav-buttons button:hover { border-color: var(--text); }

        main { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* フォーム部分 */
        .log-form {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
            display: none; /* 初期は非表示 */
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #ccc; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid var(--border);
            color: #fff;
            box-sizing: border-box;
        }

        .star-rating { color: #ffd700; font-size: 1.2rem; cursor: pointer; }

        /* フィード部分 */
        .movie-card {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            gap: 20px;
        }

        .movie-poster { width: 120px; height: 180px; object-fit: cover; background: #222; border-radius: 4px; }
        .movie-info { flex: 1; }
        .movie-title { font-size: 1.3rem; margin: 0; }
        .original-title { color: #888; font-size: 0.9rem; }
        .movie-meta { font-size: 0.8rem; color: var(--accent); margin: 5px 0; }
        .movie-notes { margin-top: 10px; font-size: 0.95rem; }

        /* 利用規約モーダル */
        #terms-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
        }
        .modal-content { max-width: 700px; margin: 0 auto; background: #111; padding: 30px; border: 1px solid var(--border); }

        footer { text-align: center; padding: 40px; font-size: 0.7rem; color: #666; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1 id="site-title">シネツウ <span>MOVIE LOG</span></h1>
    </div>
    <div class="nav-buttons">
        <button onclick="toggleForm()" id="btn-log">LOG</button>
        <button onclick="showTerms()" id="btn-terms">TERMS</button>
        <button onclick="toggleLang()" id="btn-lang">EN</button>
    </div>
</header>

<main>
    <section id="log-section" class="log-form">
        <h2 id="form-title">映画を記録する</h2>
        <div class="form-group">
            <label id="lbl-title">タイトル / Title</label>
            <input type="text" id="title" placeholder="例: ソナチネ">
        </div>
        <div class="form-group">
            <label id="lbl-original">原題 / Original Title</label>
            <input type="text" id="orig-title">
        </div>
        <div class="form-group">
            <label id="lbl-year">制作年 / Year</label>
            <input type="number" id="year" placeholder="1993">
        </div>
        <div class="form-group">
            <label id="lbl-image">画像URL / Image URL</label>
            <input type="text" id="image-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label id="lbl-rating">評価 / Rating</label>
            <select id="rating">
                <option value="5">★★★★★</option>
                <option value="4">★★★★☆</option>
                <option value="3">★★★☆☆</option>
                <option value="2">★★☆☆☆</option>
                <option value="1">★☆☆☆☆</option>
            </select>
        </div>
        <div class="form-group">
            <label id="lbl-notes">感想 / Notes</label>
            <textarea id="notes" rows="4"></textarea>
        </div>
        <button onclick="saveMovie()" style="background: var(--accent); color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%;" id="btn-save">保存 / SAVE</button>
    </section>

    <div id="movie-feed"></div>
</main>

<div id="terms-modal">
    <div class="modal-content">
        <div id="terms-text"></div>
        <button onclick="closeTerms()" style="margin-top: 20px; width: 100%; padding: 10px; cursor: pointer;">CLOSE</button>
    </div>
</div>

<footer>
    <p>© 2026 cinetsuu. All rights reserved.</p>
    <p id="footer-rights">当サイトに掲載されているレビューおよび画像の著作権は、各権利所有者に帰属します。</p>
</footer>

<script>
    let currentLang = 'ja';
    let movies = JSON.parse(localStorage.getItem('cinetsuu_logs')) || [];

    const translations = {
        ja: {
            siteTitle: "シネツウ",
            btnLog: "記録する",
            btnTerms: "利用規約",
            formTitle: "映画を記録する",
            btnSave: "保存する",
            footer: "当サイトに掲載されているレビューおよび画像の著作権は、各権利所有者に帰属します。",
            terms: `<h2>利用規約</h2>
                    <p>1. 本サイトは個人的な映画鑑賞記録を目的としています。</p>
                    <p>2. 掲載されている画像の著作権は各映画製作会社、配給会社等に帰属します。権利者からの削除要請があった場合、速やかに対応いたします。</p>
                    <p>3. ユーザーが投稿した感想の著作権は投稿者に帰属しますが、本サイト内での表示に使用されることに同意するものとします。</p>
                    <p>4. 他者への誹謗中傷や公序良俗に反する内容の投稿を禁止します。</p>
                    <p>免責事項：本サイトの利用により生じたいかなる損害についても、管理者は責任を負いません。</p>`
        },
        en: {
            siteTitle: "cinetsuu",
            btnLog: "LOG",
            btnTerms: "TERMS",
            formTitle: "Log a Movie",
            btnSave: "SAVE",
            footer: "The copyright of reviews and images on this site belongs to their respective owners.",
            terms: `<h2>Terms of Service</h2>
                    <p>1. This site is for personal movie logging purposes only.</p>
                    <p>2. Image copyrights belong to their respective film studios/distributors. We will promptly remove content upon request from rights holders.</p>
                    <p>3. Review copyrights belong to the author, but you agree to their display on this site.</p>
                    <p>4. Prohibit posts that are defamatory or violate public order and morals.</p>
                    <p>Disclaimer: The administrator is not responsible for any damage caused by using this site.</p>`
        }
    };

    function toggleLang() {
        currentLang = currentLang === 'ja' ? 'en' : 'ja';
        render();
    }

    function toggleForm() {
        const form = document.getElementById('log-section');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    function showTerms() { document.getElementById('terms-modal').style.display = 'block'; }
    function closeTerms() { document.getElementById('terms-modal').style.display = 'none'; }

    function saveMovie() {
        const movie = {
            id: Date.now(),
            title: document.getElementById('title').value,
            origTitle: document.getElementById('orig-title').value,
            year: document.getElementById('year').value,
            image: document.getElementById('image-url').value,
            rating: document.getElementById('rating').value,
            notes: document.getElementById('notes').value
        };
        movies.unshift(movie);
        localStorage.setItem('cinetsuu_logs', JSON.stringify(movies));
        render();
        toggleForm();
        // フォームクリア
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    }

    function render() {
        const t = translations[currentLang];
        document.getElementById('site-title').innerHTML = `${t.siteTitle} <span>MOVIE LOG</span>`;
        document.getElementById('btn-log').innerText = t.btnLog;
        document.getElementById('btn-terms').innerText = t.btnTerms;
        document.getElementById('form-title').innerText = t.formTitle;
        document.getElementById('btn-save').innerText = t.btnSave;
        document.getElementById('footer-rights').innerText = t.footer;
        document.getElementById('terms-text').innerHTML = t.terms;
        document.getElementById('btn-lang').innerText = currentLang === 'ja' ? 'EN' : 'JP';

        const feed = document.getElementById('movie-feed');
        feed.innerHTML = movies.map(m => `
            <div class="movie-card">
                <img src="${m.image || 'https://via.placeholder.com/120x180?text=No+Image'}" class="movie-poster">
                <div class="movie-info">
                    <h3 class="movie-title">${m.title}</h3>
                    <div class="original-title">${m.origTitle}</div>
                    <div class="movie-meta">${m.year} | ${'★'.repeat(m.rating)}${'☆'.repeat(5-m.rating)}</div>
                    <div class="movie-notes">${m.notes}</div>
                </div>
            </div>
        `).join('');
    }

    render();
</script>

</body>
</html>
